<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commande</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/BNC-website/assets/js/variables.js"></script>
  <script src="/BNC-website/assets/js/products.js"></script>
  <link rel="stylesheet" href="/BNC-website/assets/css/style.css">

  <style type="text/tailwindcss">
    /* Grâce au type="text/tailwindcss", le CDN comprend le @apply ! */
    .product_grid {
      @apply grid grid-cols-4 gap-12;
    }
  </style>
</head>
<body class="bg-yellow-50 text-gray-800">
    <header class="p-4 bg-white shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">Bélou Café</h1>
        <nav>
          <ul id="nav" class="flex gap-4"></ul>
        </nav>
    </header>
      
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navLinks = [
                { name: "Accueil", href: LINKS.index },
                { name: "Nos Produits", href: LINKS.produits },
                { name: "Où nous trouver", href: LINKS.localisation },
                { name: "Commande", href: LINKS.commande },
                { name: "Contact", href: LINKS.contact }
            ];
      
            const nav = document.getElementById('nav');
            navLinks.forEach(link => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = link.href;
                a.textContent = link.name;
                li.appendChild(a);
                nav.appendChild(li);
            });
        });
    </script>
      
      
    <main class="p-8 text-center">
        <h2 class="text-3xl font-semibold mb-6">Nos Pâtisseries</h2>
        <div id="pastries_list" class="product_grid">
            <script>
                const pastries_list = document.getElementById('pastries_list');
                document.addEventListener('DOMContentLoaded', () => {
                    PASTRIES.forEach(product => {
                        const wrapper = document.createElement('div');
                        wrapper.classList = "relative group";

                        // Image positionnée derrière
                        const image = document.createElement('img');
                        image.src = product.pic;
                        image.classList = "absolute top-[-40px] left-1/2 -translate-x-1/2 w-32 h-32 object-cover rounded-md transition-transform duration-500 group-hover:top-[-80px] z-0";
                        wrapper.appendChild(image);

                        // Texte au-dessus
                        const div_product = document.createElement('div');
                        div_product.classList = "bg-white p-4 rounded-xl shadow relative z-10";

                        const header = document.createElement('h3');
                        header.classList = "text-xl font-bold mb-2";
                        header.textContent = product.name;

                        const description = document.createElement('p');
                        description.textContent = product.description;

                        div_product.appendChild(header);
                        div_product.appendChild(description);
                        wrapper.appendChild(div_product);

                        pastries_list.appendChild(wrapper);
                    });
                });
            </script>
        </div>

        <h2 class="text-3xl font-semibold mb-6">Pour le déjeuner</h2>
        <div id="lunch_list" class="product_grid">
            <script>
                const lunch_list = document.getElementById('lunch_list');
                document.addEventListener('DOMContentLoaded', () => {
                    LUNCH.forEach(product => {
                        const wrapper = document.createElement('div');
                        wrapper.classList = "relative group";

                        // Image positionnée derrière
                        const image = document.createElement('img');
                        image.src = product.pic;
                        image.classList = "absolute top-[-40px] left-1/2 -translate-x-1/2 w-32 h-32 object-cover rounded-md transition-transform duration-500 group-hover:top-[-80px] z-0";
                        wrapper.appendChild(image);

                        // Texte au-dessus
                        const div_product = document.createElement('div');
                        div_product.classList = "bg-white p-4 rounded-xl shadow relative z-10";

                        const header = document.createElement('h3');
                        header.classList = "text-xl font-bold mb-2";
                        header.textContent = product.name;

                        const description = document.createElement('p');
                        description.textContent = product.description;

                        div_product.appendChild(header);
                        div_product.appendChild(description);
                        wrapper.appendChild(div_product);

                        lunch_list.appendChild(wrapper);
                    });
                });
            </script>
        </div>
    </main>
    

    <footer class="p-4 bg-white shadow-inner text-center">
        <p>&copy; 2025 Bélou Café</p>
      </footer>
    
    </body>
</html>
